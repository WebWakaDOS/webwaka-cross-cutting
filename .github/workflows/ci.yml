name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Check @webwaka/core version
        run: |
          LOCK_VER=$(node -e "
            const lock = require('./package-lock.json');
            const pkg = lock.packages && lock.packages['node_modules/@webwaka/core'];
            if (!pkg) { console.error('core not in lockfile'); process.exit(1); }
            console.log(pkg.version);
          ")
          echo "Resolved @webwaka/core: $LOCK_VER"
          node -e "
            const [maj, min] = '$LOCK_VER'.split('.').map(Number);
            if (maj < 1 || (maj === 1 && min < 6)) {
              console.error('core must be >= 1.6.0, got $LOCK_VER');
              process.exit(1);
            }
            console.log('core version OK: $LOCK_VER');
          "
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
